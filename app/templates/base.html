<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TrendWatch — UGC Ninja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar">
    <a class="navbar-brand" href="/">🥷 UGC Ninja <span>TrendWatch</span></a>
    <div class="d-flex align-items-center gap-1 flex-grow-1">
        <a href="/overview" class="nav-link {% if active_page == 'overview' %}active{% endif %}">
            📊 Overview
        </a>
        <a href="/" class="nav-link {% if active_page == 'campaigns' or not active_page %}active{% endif %}">
            🎯 Campaigns
        </a>
        <div class="nav-divider"></div>
        <a href="/system" class="btn-system ms-auto">
            ⚙️ System
        </a>
    </div>
</nav>
<div class="page">
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
