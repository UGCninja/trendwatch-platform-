{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
<div class="col-md-7">
    <h4 class="fw-bold mb-4">Edit Campaign</h4>
    <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
    <form method="post" action="/campaigns/{{ campaign.id }}/edit">

        <div class="mb-3">
            <label class="form-label">Campaign Name</label>
            <input type="text" name="name" class="form-control" value="{{ campaign.name }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Vertical</label>
            <input type="text" name="vertical" class="form-control"
                   value="{{ campaign.vertical or '' }}"
                   placeholder="e.g. StrategyGames, CryptoCasino, RewardsApps">
        </div>

        <div class="mb-3">
            <label class="form-label">Platforms</label>
            <div class="d-flex gap-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="platforms"
                           value="tiktok" id="plat_tt" {{ 'checked' if 'tiktok' in platforms }}>
                    <label class="form-check-label" for="plat_tt">TikTok</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="platforms"
                           value="instagram" id="plat_ig" {{ 'checked' if 'instagram' in platforms }}>
                    <label class="form-check-label" for="plat_ig">Instagram</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="platforms"
                           value="youtube" id="plat_yt" {{ 'checked' if 'youtube' in platforms }}>
                    <label class="form-check-label" for="plat_yt">YouTube Shorts</label>
                </div>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Hashtags</label>
            <input type="text" name="hashtags" class="form-control" value="{{ hashtags }}">
            <div class="form-text">Comma-separated, without #</div>
        </div>

        <div class="mb-3">
            <label class="form-label">Accounts</label>
            <input type="text" name="accounts" class="form-control" value="{{ accounts }}">
            <div class="form-text">Comma-separated, without @</div>
        </div>

        <div class="row mb-3">
            <div class="col">
                <label class="form-label">Min. Views</label>
                <input type="number" name="min_views" class="form-control" value="{{ campaign.min_views }}">
            </div>
            <div class="col">
                <label class="form-label">Min. ER (%)</label>
                <input type="number" name="min_er" class="form-control" value="{{ campaign.min_er }}" step="0.1">
            </div>
            <div class="col">
                <label class="form-label">Max. Age (days)</label>
                <input type="number" name="max_age_days" class="form-control" value="{{ campaign.max_age_days }}">
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Languages</label>
            <div class="d-flex flex-wrap gap-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="languages"
                           value="all" id="lang_all" {{ 'checked' if 'all' in languages }}>
                    <label class="form-check-label" for="lang_all">All languages</label>
                </div>
                {% for lang in ["en", "ru", "de", "fr", "es", "pt", "tr"] %}
                <div class="form-check">
                    <input class="form-check-input lang-specific" type="checkbox" name="languages"
                           value="{{ lang }}" id="lang_{{ lang }}" {{ 'checked' if lang in languages }}>
                    <label class="form-check-label" for="lang_{{ lang }}">{{ lang }}</label>
                </div>
                {% endfor %}
            </div>
            <div class="form-text">Selecting a specific language unchecks "All"</div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="/campaigns/{{ campaign.id }}" class="btn btn-outline-secondary">Cancel</a>
        </div>

    </form>
    </div>
    </div>


</div>
</div>

<script>
const allCb = document.getElementById('lang_all');
const specificCbs = document.querySelectorAll('.lang-specific');
specificCbs.forEach(cb => {
    cb.addEventListener('change', () => { if (cb.checked) allCb.checked = false; });
});
allCb.addEventListener('change', () => {
    if (allCb.checked) specificCbs.forEach(cb => cb.checked = false);
});
</script>

{% endblock %}
