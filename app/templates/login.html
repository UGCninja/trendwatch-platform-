<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TrendWatch — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;">
    <div class="card shadow" style="width:360px">
        <div class="card-body p-4">
            <h4 class="fw-bold mb-1"><span style="color:#8DC63F">TREND</span>WATCH</h4>
            <p class="mb-4 small" style="color:#888">by UGC Ninja</p>
            {% if error %}
            <div class="alert alert-danger py-2 small">{{ error }}</div>
            {% endif %}
            <form method="post" action="/login">
                <div class="mb-3">
                    <input type="password" name="password" class="form-control"
                           placeholder="Password" required autofocus>
                </div>
                <button type="submit" class="btn btn-primary w-100">Sign In</button>
            </form>
        </div>
    </div>
</body>
</html>
