{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
<div class="col-md-7">
    <h4 class="fw-bold mb-4">New Campaign</h4>
    <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
    <form method="post" action="/campaigns/new">

        <div class="mb-3">
            <label class="form-label">Campaign Name</label>
            <input type="text" name="name" class="form-control"
                   placeholder="e.g. Kingdom Clash competitors" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Vertical</label>
            <div class="d-flex gap-2">
                <select name="vertical" class="form-select">
                    <option value="">— Select vertical —</option>
                    {% for v in verticals %}
                    <option value="{{ v }}">{{ v }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="d-flex gap-2 mt-2">
                <form method="post" action="/verticals/add" class="d-flex gap-2 w-100">
                    <input type="text" name="name" class="form-control form-control-sm"
                           placeholder="Add new vertical...">
                    <button class="btn btn-sm btn-outline-secondary" type="submit">Add</button>
                </form>
                {% for v in verticals %}
                <form method="post" action="/verticals/remove" style="display:inline">
                    <input type="hidden" name="name" value="{{ v }}">
                    <button class="btn btn-sm btn-outline-danger" type="submit"
                            title="Remove {{ v }}">×</button>
                </form>
                {% endfor %}
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Platforms</label>
            <div class="d-flex gap-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="platforms"
                           value="tiktok" id="plat_tt" checked>
                    <label class="form-check-label" for="plat_tt">TikTok</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="platforms"
                           value="instagram" id="plat_ig" checked>
                    <label class="form-check-label" for="plat_ig">Instagram</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="platforms"
                           value="youtube" id="plat_yt" checked>
                    <label class="form-check-label" for="plat_yt">YouTube Shorts</label>
                </div>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Hashtags</label>
            <input type="text" name="hashtags" class="form-control"
                   placeholder="ClashOfClans, ClashRoyale, RiseOfKingdoms">
            <div class="form-text">Comma-separated, without #</div>
        </div>

        <div class="mb-3">
            <label class="form-label">Accounts</label>
            <input type="text" name="accounts" class="form-control"
                   placeholder="clashofclans, supercell">
            <div class="form-text">Comma-separated, without @</div>
        </div>

        <div class="row mb-3">
            <div class="col">
                <label class="form-label">Min. Views</label>
                <input type="number" name="min_views" class="form-control" value="300000" min="0">
            </div>
            <div class="col">
                <label class="form-label">Min. ER (%)</label>
                <input type="number" name="min_er" class="form-control" value="2.0" step="0.1" min="0">
            </div>
            <div class="col">
                <label class="form-label">Max. Age (days)</label>
                <input type="number" name="max_age_days" class="form-control" value="180" min="1">
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Languages</label>
            <div class="d-flex flex-wrap gap-3" id="lang-group">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="languages"
                           value="all" id="lang_all" checked>
                    <label class="form-check-label" for="lang_all">All languages</label>
                </div>
                {% for lang in ["en", "ru", "de", "fr", "es", "pt", "tr"] %}
                <div class="form-check">
                    <input class="form-check-input lang-specific" type="checkbox" name="languages"
                           value="{{ lang }}" id="lang_{{ lang }}">
                    <label class="form-check-label" for="lang_{{ lang }}">{{ lang }}</label>
                </div>
                {% endfor %}
            </div>
            <div class="form-text">Selecting a specific language unchecks "All"</div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Create Campaign</button>
            <a href="/" class="btn btn-outline-secondary">Cancel</a>
        </div>

    </form>
    </div>
    </div>
</div>
</div>

<script>
const allCb = document.getElementById('lang_all');
const specificCbs = document.querySelectorAll('.lang-specific');
specificCbs.forEach(cb => {
    cb.addEventListener('change', () => {
        if (cb.checked) allCb.checked = false;
    });
});
allCb.addEventListener('change', () => {
    if (allCb.checked) specificCbs.forEach(cb => cb.checked = false);
});
</script>

{% endblock %}
